# ─────────────────────────────────────────────────────────────────────────────
# BandiRadar — Test smoke automatico (Fase 1.5)
#
# Ogni notte alle 03:30 ora italiana (02:30 UTC), DOPO il sync delle 02:00:
#   1. avvia un piccolo server HTTP statico nel repository
#   2. apre index.html in un browser headless (Playwright/Chromium)
#   3. verifica che la dashboard:
#        - carichi senza errori console di tipo "error"
#        - faccia fetch di data/bandi.csv con status 200
#        - renderizzi almeno 1 card bando (selettore .bando-card o .list-item)
#        - non mostri lo stato di errore visibile
#   4. se qualcosa fallisce → email a NOTIFY_EMAIL con screenshot allegato
#
# Avvio manuale: Actions → Test smoke dashboard → Run workflow
# ─────────────────────────────────────────────────────────────────────────────

name: Test smoke dashboard

on:
  schedule:
    - cron: '30 2 * * *'   # 03:30 ora italiana (02:30 UTC), dopo il sync delle 02:00
  workflow_dispatch:

jobs:
  smoke:
    name: Apri dashboard in browser e verifica
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa Playwright
        run: |
          pip install playwright==1.45.0
          playwright install --with-deps chromium

      - name: Avvia server HTTP statico in background
        run: |
          cd ${GITHUB_WORKSPACE}
          nohup python3 -m http.server 8765 > /tmp/server.log 2>&1 &
          sleep 2
          echo "Server avviato su porta 8765"
          curl -s -o /dev/null -w "%{http_code}\n" http://localhost:8765/index.html || true

      - name: Esegui smoke test
        id: smoke
        run: |
          python << 'EOF'
          import asyncio, os, sys, json
          from playwright.async_api import async_playwright

          URL = "http://localhost:8765/index.html"
          FAILS  = []
          PASSES = []

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  ctx     = await browser.new_context()
                  page    = await ctx.new_context() if False else await ctx.new_page()

                  console_errors = []
                  page.on("console", lambda msg: console_errors.append(msg.text) if msg.type == "error" else None)

                  # Network: monitor del fetch di bandi.csv
                  csv_status = {'code': None}
                  async def handle_response(resp):
                      if 'bandi.csv' in resp.url:
                          csv_status['code'] = resp.status
                  page.on("response", lambda r: asyncio.create_task(handle_response(r)))

                  # 1. Page loads
                  try:
                      resp = await page.goto(URL, wait_until="networkidle", timeout=20000)
                      if resp and resp.status == 200:
                          PASSES.append("Pagina caricata (HTTP 200)")
                      else:
                          FAILS.append(f"Pagina non caricata: status {resp.status if resp else 'None'}")
                  except Exception as e:
                      FAILS.append(f"Errore caricamento pagina: {e}")

                  # 2. CSV fetch OK
                  await page.wait_for_timeout(2000)
                  if csv_status['code'] == 200:
                      PASSES.append("Fetch data/bandi.csv: 200")
                  elif csv_status['code'] is None:
                      FAILS.append("Fetch di data/bandi.csv non intercettato (dashboard non lo richiede?)")
                  else:
                      FAILS.append(f"Fetch data/bandi.csv: status {csv_status['code']}")

                  # 3. Almeno 1 card bando renderizzata
                  try:
                      await page.wait_for_selector('.bando-card, .list-item', timeout=10000)
                      n_cards = await page.locator('.bando-card, .list-item').count()
                      if n_cards >= 1:
                          PASSES.append(f"Renderizzate {n_cards} card/item bando")
                      else:
                          FAILS.append("Nessuna card bando renderizzata")
                  except Exception as e:
                      FAILS.append(f"Nessuna .bando-card o .list-item trovata entro 10s: {e}")

                  # 4. Stato "Errore caricamento" non visibile (se presente in HTML)
                  try:
                      err_visible = await page.locator('text=Impossibile caricare').count()
                      if err_visible > 0:
                          FAILS.append("Mostrato messaggio di errore in dashboard")
                      else:
                          PASSES.append("Nessun messaggio di errore in dashboard")
                  except Exception:
                      pass

                  # 5. Errori console
                  if console_errors:
                      FAILS.append(f"Errori console JS: {len(console_errors)} (primo: {console_errors[0][:200]})")
                  else:
                      PASSES.append("Nessun errore console JS")

                  # Screenshot sempre, utile in caso di KO
                  await page.screenshot(path='/tmp/dashboard.png', full_page=True)

                  await browser.close()

          asyncio.run(main())

          print("\n=== RISULTATO SMOKE TEST ===")
          for p in PASSES:
              print(f"  OK   {p}")
          for f in FAILS:
              print(f"  FAIL {f}")

          with open('/tmp/smoke_result.txt', 'w') as f:
              f.write("=== BandiRadar smoke test ===\n\n")
              f.write("PASSED:\n")
              for p in PASSES: f.write(f"  - {p}\n")
              f.write("\nFAILED:\n")
              for fl in FAILS: f.write(f"  - {fl}\n")

          if FAILS:
              with open(os.environ['GITHUB_OUTPUT'], 'a') as o:
                  o.write("smoke_failed=true\n")
                  o.write(f"fail_count={len(FAILS)}\n")
              sys.exit(1)
          else:
              with open(os.environ['GITHUB_OUTPUT'], 'a') as o:
                  o.write("smoke_failed=false\n")
          EOF

      - name: Email — smoke test fallito
        if: failure()
        continue-on-error: true   # senza SMTP configurato, l'invio fallisce ma non blocca il workflow
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    587
          username:       ${{ secrets.SMTP_USER }}
          password:       ${{ secrets.SMTP_PASS }}
          to:             ${{ secrets.NOTIFY_EMAIL }}
          from:           BandiRadar <${{ secrets.SMTP_USER }}>
          subject:        "BandiRadar — Smoke test dashboard FALLITO (${{ steps.smoke.outputs.fail_count || '?' }} problemi)"
          body: |
            Il test smoke automatico della dashboard ha rilevato uno o più problemi.

            Cosa significa: la dashboard pubblica potrebbe non funzionare correttamente
            per chi la apre adesso (cliente, prospect, te stesso da mobile).

            Guarda l'allegato "smoke_result.txt" per il dettaglio e "dashboard.png"
            per uno screenshot di cosa vede il browser.

            Log completo:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            (Email automatica — non rispondere)
          attachments: |
            /tmp/smoke_result.txt
            /tmp/dashboard.png
