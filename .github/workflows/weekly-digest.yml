# ─────────────────────────────────────────────────────────────────────────────
# BandiRadar — Digest settimanale per-cliente (ogni lunedì alle 08:00 IT)
#
# Per ogni cliente in aziende.json con campo "email" valorizzato:
#   1. Legge le raccomandazioni da data/raccomandazioni_[CODICE].json
#   2. Filtra solo i bandi nuovi/aggiornati dall'ultima esecuzione
#   3. Se ci sono bandi nuovi → invia email personalizzata al cliente
#   4. Se email vuota o nessuna novità → salta silenziosamente
#   5. Se almeno un invio fallisce → GitHub notifica Alex
#
# SETUP RICHIESTO (una tantum in Settings → Secrets and variables → Actions):
#   SMTP_USER   → email Gmail mittente (es: bandiradar@gmail.com)
#   SMTP_PASS   → App Password Gmail (non la password normale — vai su myaccount.google.com)
#
# Avvio manuale: Actions → Digest Settimanale → Run workflow
# ─────────────────────────────────────────────────────────────────────────────

name: Digest Settimanale Email

on:
  schedule:
    - cron: '0 7 * * 1'   # ogni lunedì alle 08:00 ora italiana (07:00 UTC)
  workflow_dispatch:

jobs:
  digest:
    name: Invia digest personalizzato per cliente
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Genera e invia email per ogni cliente
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          python << 'EOF'
          import csv, json, os, sys, smtplib
          from datetime import date, timedelta
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          TODAY            = date.today()
          UNA_SETTIMANA_FA = TODAY - timedelta(days=7)
          SMTP_USER        = os.environ.get('SMTP_USER', '')
          SMTP_PASS        = os.environ.get('SMTP_PASS', '')

          # ── Helper ──────────────────────────────────────────────────────
          def parse_date(s):
              if not s: return None
              try: return date.fromisoformat(s.strip())
              except: return None

          def fmt_euro(s):
              try:
                  n = float(s) if s else 0
                  if n <= 0: return '—'
                  if n >= 1e9: return f"€ {n/1e9:.1f} Mld"
                  if n >= 1e6: return f"€ {int(n/1e6)} Mln"
                  if n >= 1e3: return f"€ {int(n/1e3)}K"
                  return f"€ {int(n):,}"
              except: return '—'

          def is_link_rotto(bid, link_status):
              info = link_status.get(bid, {})
              return isinstance(info, dict) and info.get('status') == 'ko'

          def invia_email(dest, oggetto, html):
              try:
                  msg = MIMEMultipart('alternative')
                  msg['Subject'] = oggetto
                  msg['From']    = f'BandiRadar <{SMTP_USER}>'
                  msg['To']      = dest
                  msg.attach(MIMEText(html, 'html', 'utf-8'))
                  with smtplib.SMTP('smtp.gmail.com', 587) as srv:
                      srv.ehlo(); srv.starttls()
                      srv.login(SMTP_USER, SMTP_PASS)
                      srv.sendmail(SMTP_USER, [dest], msg.as_string())
                  return True, None
              except Exception as e:
                  return False, str(e)

          # ── Carica dati base ─────────────────────────────────────────────
          bandi_map = {}
          try:
              with open('data/bandi.csv', encoding='utf-8-sig') as f:
                  for row in csv.DictReader(f):
                      bid = row.get('ID bando','').strip()
                      if bid: bandi_map[bid] = row
          except FileNotFoundError:
              print('ERRORE: data/bandi.csv non trovato'); sys.exit(1)

          link_status = {}
          try:
              with open('data/link_status.json', encoding='utf-8') as f:
                  link_status = json.load(f)
          except: pass

          aziende = []
          try:
              with open('data/aziende.json', encoding='utf-8') as f:
                  data = json.load(f)
                  aziende = data.get('aziende', data) if isinstance(data, dict) else data
          except FileNotFoundError:
              print('ERRORE: data/aziende.json non trovato'); sys.exit(1)

          ultima_data = UNA_SETTIMANA_FA
          try:
              with open('data/ultimo_digest.json', encoding='utf-8') as f:
                  ud = json.load(f)
                  ultima_data = parse_date(ud.get('data','')) or UNA_SETTIMANA_FA
          except: pass

          print(f'Bandi "nuovi" = inseriti dopo: {ultima_data}')
          print(f'Clienti in aziende.json: {len(aziende)}')
          print()

          # ── Ciclo per cliente ────────────────────────────────────────────
          inviati = 0
          saltati = 0
          errori  = []

          for az in aziende:
              codice = az.get('codiceMnemonico','')
              nome   = az.get('nomeProfilo') or az.get('ragioneSociale') or codice
              email  = (az.get('email') or '').strip()

              if not email or not codice:
                  saltati += 1
                  print(f'[SKIP] {nome} — {"email mancante" if not email else "codice mancante"}')
                  continue

              racc_file = f'data/raccomandazioni_{codice}.json'
              if not os.path.exists(racc_file):
                  saltati += 1
                  print(f'[SKIP] {nome} — nessun file {racc_file}')
                  continue

              try:
                  with open(racc_file, encoding='utf-8') as f:
                      racc_data = json.load(f)
              except Exception as e:
                  print(f'[ERR]  {nome} — impossibile leggere {racc_file}: {e}')
                  continue

              racc_items = []
              for az_block in racc_data.get('aziende', []):
                  racc_items.extend(az_block.get('raccomandazioni', []))

              # Filtra bandi nuovi dall'ultima esecuzione
              bandi_nuovi = []
              for item in racc_items:
                  bid  = item.get('id','')
                  brow = bandi_map.get(bid)
                  if not brow: continue
                  d_ins = parse_date(brow.get('Data inserimento',''))
                  d_upd = parse_date(brow.get('Ultimo aggiornamento',''))
                  d_max = max(filter(None, [d_ins, d_upd]), default=None)
                  if d_max and d_max > ultima_data:
                      bandi_nuovi.append((item, brow))

              if not bandi_nuovi:
                  saltati += 1
                  print(f'[SKIP] {nome} ({email}) — nessun bando nuovo questa settimana')
                  continue

              print(f'[SEND] {nome} ({email}) — {len(bandi_nuovi)} bandi nuovi')

              # ── HTML email ───────────────────────────────────────────────
              oggi_it = TODAY.strftime('%-d %B %Y')
              html = f"""<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8">
<style>
  body{{margin:0;padding:0;background:#f4f6f9;font-family:Arial,Helvetica,sans-serif;color:#111827}}
  .wrap{{max-width:620px;margin:24px auto;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb}}
  .hdr{{background:#1e40af;padding:24px 28px}}
  .hdr h1{{color:#fff;font-size:20px;margin:0;font-weight:bold}}
  .hdr p{{color:#bfdbfe;font-size:13px;margin:4px 0 0}}
  .intro{{padding:20px 28px 8px;font-size:14px;color:#374151;line-height:1.6}}
  .section-title{{padding:6px 28px 10px;font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:0.7px;color:#9ca3af}}
  .bando{{margin:0 20px 10px;border:1px solid #e5e7eb;border-radius:8px;padding:14px 16px;background:#f9fafb}}
  .b-nome{{font-size:14px;font-weight:bold;color:#111827;margin:0 0 2px}}
  .b-ente{{font-size:12px;color:#6b7280;margin:0 0 8px}}
  .badge{{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:bold}}
  .urg{{background:#fee2e2;color:#991b1b}}
  .pre{{background:#fef3c7;color:#92400e}}
  .ape{{background:#d1fae5;color:#065f46}}
  .meta{{font-size:12px;color:#374151;margin-top:8px}}
  .motivaz{{font-size:12px;color:#374151;font-style:italic;margin-top:6px}}
  .btn{{display:inline-block;margin-top:10px;background:#1e40af;color:#fff;padding:7px 16px;border-radius:5px;text-decoration:none;font-size:12px;font-weight:bold}}
  .warn{{display:inline-block;margin-top:10px;background:#fef3c7;color:#92400e;padding:6px 14px;border-radius:5px;font-size:12px;font-weight:bold;border:1px solid #fde68a}}
  .footer{{padding:18px 28px;background:#f3f4f6;border-top:1px solid #e5e7eb;font-size:11px;color:#9ca3af;line-height:1.8}}
</style></head><body>
<div class="wrap">
  <div class="hdr">
    <h1>📡 BandiRadar — Novità della settimana</h1>
    <p>{oggi_it} &nbsp;·&nbsp; Aggiornamento per {nome}</p>
  </div>
  <div class="intro">
    Ciao,<br>
    questa settimana ci sono <strong>{len(bandi_nuovi)} bandi nuovi o aggiornati</strong> rilevanti per <strong>{nome}</strong>.
  </div>
  <div class="section-title">Bandi consigliati</div>"""

              for item, brow in bandi_nuovi:
                  bid     = item.get('id','')
                  nome_b  = item.get('nome') or brow.get('Nome bando','')
                  ente    = brow.get('Ente erogatore','')
                  link    = brow.get('Link ufficiale','')
                  importo = fmt_euro(brow.get('Importo max beneficiario',''))
                  perc    = brow.get('% Contributo','')
                  tipo    = brow.get('Tipo agevolazione','').split('|')[0].strip()
                  scad_d  = parse_date(brow.get('Scadenza',''))
                  motiv   = item.get('motivazione','')
                  rotto   = is_link_rotto(bid, link_status)
                  contributo = importo + (f' — {perc}%' if perc else '')

                  if scad_d:
                      giorni = (scad_d - TODAY).days
                      if giorni <= 30:
                          badge = f'<span class="badge urg">🚨 Scade in {giorni} giorni ({scad_d.strftime("%-d/%m/%Y")})</span>'
                      else:
                          badge = f'<span class="badge pre">⚠️ Scade il {scad_d.strftime("%-d/%m/%Y")} ({giorni} giorni)</span>'
                  else:
                      badge = '<span class="badge ape">✅ Sportello aperto</span>'

                  link_html = (
                      '<div class="warn">⚠️ Link ufficiale temporaneamente non raggiungibile — contattami per i dettagli</div>'
                      if rotto else
                      f'<a class="btn" href="{link}">Vai al bando ufficiale →</a>'
                  )

                  html += f"""
  <div class="bando">
    <div class="b-nome">{nome_b}</div>
    <div class="b-ente">{ente}</div>
    {badge}
    <div class="meta">💰 {contributo} &nbsp;·&nbsp; 📋 {tipo}</div>
    {f'<div class="motivaz">"{motiv}"</div>' if motiv else ''}
    {link_html}
  </div>"""

              html += f"""
  <div class="footer">
    Per maggiori informazioni o per procedere con la domanda, rispondimi a questa email.<br>
    <strong>Alex</strong> — Consulente di finanza agevolata<br><br>
    BandiRadar · Aggiornamento automatico del {oggi_it} · Non rispondere direttamente a questa email
  </div>
</div></body></html>"""

              oggetto = f'📡 BandiRadar {TODAY.strftime("%d/%m/%Y")} — {len(bandi_nuovi)} novità per {nome}'
              ok, err = invia_email(email, oggetto, html)
              if ok:
                  inviati += 1
                  print(f'  ✅ Inviata a {email}')
              else:
                  errori.append(f'{nome} ({email}): {err}')
                  print(f'  ❌ Errore: {err}')

          # ── Aggiorna ultimo_digest.json ──────────────────────────────────
          try:
              with open('data/ultimo_digest.json', 'w', encoding='utf-8') as f:
                  json.dump({'data': TODAY.isoformat(), 'inviati': inviati}, f, indent=2)
          except Exception as e:
              print(f'WARN: impossibile aggiornare ultimo_digest.json: {e}')

          # ── Riepilogo ────────────────────────────────────────────────────
          print()
          print('=' * 50)
          print(f'RIEPILOGO: {inviati} inviate · {saltati} saltate · {len(errori)} errori')
          if errori:
              print('ERRORI:')
              for e in errori: print(f'  - {e}')
              sys.exit(1)   # fa fallire il workflow → GitHub notifica Alex
          EOF

      # Nota: ultimo_digest.json NON viene committato automaticamente
      # per evitare loop infiniti (push → trigger workflow → push → ...).
      # Viene aggiornato manualmente da Alex con il file .bat insieme agli altri file.
