name: Digest Settimanale Email

# Gira ogni lunedi alle 08:00 ora italiana (07:00 UTC)
# Oppure manualmente da Actions -> Run workflow
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  digest:
    name: Invia digest personalizzato per cliente
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Esegui digest
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python scripts/invia_digest.py
