<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina non trovata — BandiRadar</title>
  <meta http-equiv="refresh" content="4; url=/">
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22&gt;&lt;text y=%22.9em%22 font-size=%2290%22&gt;📡&lt;/text&gt;&lt;/svg&gt;">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
      color: white;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 520px; width: 100%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      padding: 44px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .icon { font-size: 56px; margin-bottom: 14px; }
    h1 {
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
      margin-bottom: 10px;
    }
    .code {
      display: inline-block;
      font-family: monospace; font-size: 12px;
      background: rgba(255,255,255,0.18);
      padding: 3px 9px; border-radius: 12px;
      margin-bottom: 18px;
      letter-spacing: 1px;
    }
    p {
      font-size: 14px; line-height: 1.6;
      opacity: 0.92; margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 11px 22px;
      background: white; color: #1e40af;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600; font-size: 14px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.18);
    }
    .small {
      margin-top: 22px; font-size: 12px; opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <div class="code">404 — PAGINA NON TROVATA</div>
    <h1>Bando non trovato</h1>
    <p>
      La pagina che cercavi non esiste o è stata spostata.
      Forse il link è vecchio, oppure c'è un errore nell'indirizzo.
    </p>
    <a class="btn" href="/">← Torna alla dashboard BandiRadar</a>
    <div class="small">Verrai reindirizzato automaticamente tra qualche secondo…</div>
  </div>
</body>
</html>
