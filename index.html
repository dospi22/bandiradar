// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function v2DaysUntil(dateStr) {

}
function v2FormatDate(dateStr) {

}
function v2FormatImporto(n) {
  if (n >= 1e9) return "€" + (n/1e9).toFixed(1) + "B";
  if (n >= 1e6) return "€" + (n/1e6).toFixed(1) + "M";
  if (n >= 1e3) return "€" + Math.round(n/1e3) + "k";
  return "€" + n;
}

            <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><V2Icon name="search" size={14} color="rgba(255,255,255,0.25)" /></div>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Cerca bando, ente, keyword..."
              style={{width:"100%",padding:"10px 12px 10px 34px",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.03)",fontFamily:"var(--v2-font-body)",fontSize:13,color:"#e2e8f0",outline:"none"}}
            />

          {[{v:liv,s:setLiv,o:V2_LIVELLI,p:"Livello"},{v:cat,s:setCat,o:V2_CATEGORIE,p:"Categoria"}].map(({v,s,o,p})=>(
            <select key={p} value={v} onChange={e=>s(e.target.value)} style={{
              padding:"10px 30px 10px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",
              background:"rgba(255,255,255,0.03)",fontSize:12,color: v?"#e2e8f0":"rgba(255,255,255,0.35)",
              cursor:"pointer",outline:"none",fontFamily:"var(--v2-font-body)",minWidth:120
            }}>
              <option value="" style={{background:"#1e293b"}}>{p}</option>
              {o.map(x=><option key={x} value={x} style={{background:"#1e293b"}}>{x}</option>)}
            </select>
          ))}
          <button onClick={()=>setShowAdv(!showAdv)} style={{
            display:"flex",alignItems:"center",gap:5,padding:"10px 14px",borderRadius:10,
            border:"1px solid rgba(255,255,255,0.08)",background: showAdv?"rgba(99,102,241,0.15)":"rgba(255,255,255,0.03)",
            color: showAdv?"#a5b4fc":"rgba(255,255,255,0.4)",fontSize:12,fontWeight:500,cursor:"pointer"
          }}>
            <V2Icon name="filter" size={13} /> Avanzati
          </button>
          {hasF && <button onClick={()=>{setQ("");setLiv("");setCat("");}} style={{display:"flex",alignItems:"center",gap:4,padding:"10px 14px",borderRadius:10,border:"none",background:"rgba(248,113,113,0.12)",color:"#fca5a5",fontSize:12,fontWeight:600,cursor:"pointer"}}>
            <V2Icon name="x" size={12} color="#fca5a5" /> Reset
          </button>}
        </div>
        {showAdv && (
          <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(255,255,255,0.05)",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
            {["Beneficiari","Tipo agevolazione","Regime aiuto","Ambito","Tipo scadenza","Priorità"].map(l=>(
              <select key={l} style={{padding:"8px 10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.06)",background:"rgba(255,255,255,0.02)",fontSize:11,color:"rgba(255,255,255,0.35)",cursor:"pointer",outline:"none"}}>
                <option style={{background:"#1e293b"}}>{l}</option>
              </select>
            ))}
          </div>
        )}
      </div>

      {/* Results bar */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontFamily:"var(--v2-font-num)",fontSize:24,fontWeight:800,color:"#f1f5f9"}}>{fil.length}</span>
          <span style={{fontSize:13,color:"rgba(255,255,255,0.35)"}}>bandi trovati</span>
          {hasF && <V2Badge variant="accent">{[q,liv,cat].filter(Boolean).length} filtri</V2Badge>}
        </div>
        <div style={{display:"flex",borderRadius:10,border:"1px solid rgba(255,255,255,0.06)",overflow:"hidden"}}>
          {[{v:"grid",i:"grid"},{v:"list",i:"list"}].map(({v,i})=>(
            <button key={v} onClick={()=>setView(v)} style={{padding:"7px 12px",border:"none",cursor:"pointer",background: view===v?"rgba(99,102,241,0.2)":"transparent",color: view===v?"#a5b4fc":"rgba(255,255,255,0.25)"}}>
              <V2Icon name={i} size={14} />
            </button>
          ))}
        </div>
      </div>

      {/* In Evidenza */}
      {evidenza.length > 0 && (
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
            <V2Icon name="lightning" size={12} color="#fbbf24" /> In evidenza
          </div>
          <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:4}}>
            {evidenza.map(b=><V2EvidenzaCard key={b.id} bando={b} onClick={onOpen} />)}
          </div>
        </div>
      )}

      {/* Grid / List */}
      {fil.length === 0 ? (
        <div style={{textAlign:"center",padding:60,color:"rgba(255,255,255,0.2)"}}>
          <V2Icon name="search" size={40} color="rgba(255,255,255,0.1)" />
          <div style={{fontFamily:"var(--v2-font-display)",fontWeight:700,fontSize:16,marginTop:12,color:"rgba(255,255,255,0.3)"}}>Nessun risultato</div>
        </div>
      ) : view === "grid" ? (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(330px,1fr))",gap:14}}>
          {fil.map(b=><V2BandoCard key={b.id} bando={b} onClick={onOpen} view="grid" />)}
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {fil.map(b=><V2BandoCard key={b.id} bando={b} onClick={onOpen} view="list" />)}
        </div>
      )}
    </div>
  );
}

Object.assign(window, { V2BandiSection, V2Modal });

<script type="text/babel">
/* v2-sections.jsx — Scadenze, Profili, Pratiche in premium dark style */
const { useState } = React;

/* ══════════════════════════════════════════════════════════
   SCADENZE — Timeline
   ══════════════════════════════════════════════════════════ */
function V2ScadenzeSection({ onOpen }) {
  const withDate = V2_BANDI.filter(b => b.scadenza && b.scadenza !== "Sportello" && b.scadenza !== "Strutturale" && b.stato === "Aperto");
  const sportello = V2_BANDI.filter(b => b.tipoScadenza === "Sportello" || b.tipoScadenza === "Misura strutturale");
  const mesiMap = {};
  withDate.forEach(b => {
    const d = new Date(b.scadenza);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    (mesiMap[k] = mesiMap[k] || []).push(b);
  });
  const mesi = Object.keys(mesiMap).sort();
  const meseNome = k => { const [y,m] = k.split("-"); return new Date(+y,+m-1).toLocaleDateString("it-IT",{month:"long",year:"numeric"}); };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {/* Sportello */}
      {sportello.length > 0 && (
        <div style={{padding:"18px 20px",borderRadius:16,background:"rgba(99,102,241,0.06)",border:"1px solid rgba(99,102,241,0.1)"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#818cf8",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Sempre aperti · Sportello & Strutturali</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {sportello.map(b=>(
              <button key={b.id} onClick={()=>onOpen(b)} style={{
                padding:"7px 14px",borderRadius:10,background:"rgba(99,102,241,0.1)",
                border:"1px solid rgba(99,102,241,0.15)",color:"#a5b4fc",fontSize:12,fontWeight:600,
                cursor:"pointer",fontFamily:"var(--v2-font-body)",transition:"all .15s"
              }}>{b.nome}</button>
            ))}
          </div>
        </div>
      )}

      {/* Months */}
      {mesi.map(k => {
        const bandi = mesiMap[k].sort((a,b) => new Date(a.scadenza) - new Date(b.scadenza));
        return (
          <div key={k} style={{borderRadius:16,overflow:"hidden",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <span style={{fontFamily:"var(--v2-font-display)",fontWeight:700,fontSize:15,color:"#e2e8f0",textTransform:"capitalize"}}>{meseNome(k)}</span>
              <V2Badge variant="default">{bandi.length}</V2Badge>
            </div>
            {bandi.map(b => {
              const d = new Date(b.scadenza);
              const days = v2DaysUntil(b.scadenza);
              const urg = days >= 0 && days <= 30;
              const presto = days > 30 && days <= 60;
              return (
                <div key={b.id} onClick={()=>onOpen(b)} className="v2-hover" style={{
                  display:"flex",alignItems:"center",gap:14,padding:"12px 20px",
                  borderBottom:"1px solid rgba(255,255,255,0.03)",cursor:"pointer",transition:"all .15s"
                }}>
                  <div style={{
                    width:50,height:50,borderRadius:12,flexShrink:0,
                    background: urg?"rgba(248,113,113,0.1)":presto?"rgba(251,191,36,0.08)":"rgba(255,255,255,0.03)",
                    border: urg?"1px solid rgba(248,113,113,0.15)":presto?"1px solid rgba(251,191,36,0.1)":"1px solid rgba(255,255,255,0.05)",
                    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"
                  }}>
                    <span style={{fontFamily:"var(--v2-font-num)",fontWeight:800,fontSize:18,lineHeight:1,color: urg?"#f87171":presto?"#fbbf24":"#e2e8f0"}}>{d.getDate()}</span>
                    <span style={{fontSize:9,fontWeight:600,color:"rgba(255,255,255,0.3)",textTransform:"uppercase"}}>{d.toLocaleDateString("it-IT",{month:"short"})}</span>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:"var(--v2-font-display)",fontWeight:600,fontSize:13,color:"#e2e8f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.nome}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:1}}>{b.ente}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                    <V2LivBadge livello={b.livello} />
                    <V2Badge variant={urg?"urgente":presto?"presto":"default"}>{days < 0 ? "Scaduto" : days+"gg"}</V2Badge>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   PROFILI AZIENDE
   ══════════════════════════════════════════════════════════ */
function V2ProfiliSection({ onOpen }) {
  const [selId, setSelId] = useState(V2_AZIENDE[0]?.id || null);
  const sel = V2_AZIENDE.find(a => a.id === selId);
  const raccs = sel ? (V2_RACCOMANDAZIONI[sel.id] || []) : [];

  return (
    <div style={{display:"flex",flex:1,overflow:"hidden",margin:"-24px -28px",height:"calc(100% + 48px)"}}>
      {/* Sidebar */}
      <div style={{width:280,flexShrink:0,borderRight:"1px solid rgba(255,255,255,0.05)",overflow:"auto",display:"flex",flexDirection:"column",padding:"16px 0"}}>
        <div style={{padding:"0 16px 14px"}}>
          <div style={{fontFamily:"var(--v2-font-display)",fontWeight:700,fontSize:14,color:"#e2e8f0",marginBottom:2}}>Aziende</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>{V2_AZIENDE.length} profili</div>
        </div>
        {V2_AZIENDE.map(a => (
          <div key={a.id} onClick={()=>setSelId(a.id)} style={{
            padding:"12px 16px",cursor:"pointer",
            borderLeft: selId===a.id ? "3px solid #818cf8" : "3px solid transparent",
            background: selId===a.id ? "rgba(99,102,241,0.08)" : "transparent",
            transition:"all .15s"
          }}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <div style={{width:36,height:36,borderRadius:10,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"var(--v2-font-display)",fontWeight:800,fontSize:14,color:"#818cf8"}}>
                {a.nome.charAt(0)}
              </div>
              <div>
                <div style={{fontFamily:"var(--v2-font-display)",fontWeight:600,fontSize:13,color: selId===a.id?"#a5b4fc":"#e2e8f0"}}>{a.nome}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>{a.settore}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {a.tags.map(t=><V2Tag key={t} label={t} />)}
            </div>
          </div>
        ))}
        <button style={{
          margin:"12px 16px",padding:12,borderRadius:12,border:"1px dashed rgba(255,255,255,0.1)",
          background:"transparent",cursor:"pointer",color:"rgba(255,255,255,0.3)",fontSize:12,fontWeight:600,
          display:"flex",alignItems:"center",justifyContent:"center",gap:6
        }}>
          <V2Icon name="plus" size={14} /> Aggiungi
        </button>
      </div>

      {/* Main — Raccomandazioni */}
      <div style={{flex:1,overflow:"auto",padding:"24px 28px"}}>
        {sel ? (
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <image-slot id={`v2-logo-${sel.id}`} shape="rounded" radius="14" placeholder={`Logo ${sel.nome}`}
                  style={{width:52,height:52,flexShrink:0}}></image-slot>
                <div>
                  <h2 style={{fontFamily:"var(--v2-font-display)",fontWeight:700,fontSize:18,color:"#f1f5f9",margin:0,letterSpacing:"-0.02em"}}>{sel.nome}</h2>
                  <p style={{fontSize:12,color:"rgba(255,255,255,0.35)",margin:"3px 0 0"}}>{sel.settore} · {sel.citta}</p>
                </div>
              </div>
              <button style={{display:"flex",alignItems:"center",gap:6,padding:"9px 16px",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",background:"transparent",cursor:"pointer",fontSize:12,fontWeight:500,color:"rgba(255,255,255,0.4)"}}>
                <V2Icon name="download" size={13} /> Esporta
              </button>
            </div>

            <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",letterSpacing:"0.1em"}}>
              {raccs.length} bandi raccomandati
            </div>

            {raccs.map(r => {
              const b = V2_BANDI.find(x => x.id === r.bandoId);
              if (!b) return null;
              const cv = {
                "molto-alta":{v:"moltalta",l:"Molto Alta"},
                "alta":{v:"alta",l:"Alta"},
                "media":{v:"media",l:"Media"}
              }[r.compatibilita] || {v:"default",l:r.compatibilita};
              return (
                <div key={r.bandoId} onClick={()=>onOpen(b)} className="v2-hover" style={{
                  padding:"16px 20px",borderRadius:14,cursor:"pointer",
                  background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",transition:"all .2s"
                }}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div>
                      <div style={{fontFamily:"var(--v2-font-display)",fontWeight:700,fontSize:14,color:"#e2e8f0",marginBottom:3}}>{b.nome}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>{b.ente}</div>
                    </div>
                    <V2Badge variant={cv.v}>{cv.l}</V2Badge>
                  </div>
                  <div style={{fontSize:12,fontStyle:"italic",color:"rgba(255,255,255,0.4)",marginBottom:10,lineHeight:1.5}}>{r.motivo}</div>
                  <div style={{display:"flex",gap:8}}>
                    <V2Badge><V2Icon name="clock" size={10} style={{marginRight:3}} />{v2FormatDate(b.scadenza)}</V2Badge>
                    <V2Badge><V2Icon name="euro" size={10} style={{marginRight:3}} />{v2FormatImporto(b.importoMax)}</V2Badge>
                    <V2Badge>{b.tipoAgev}</V2Badge>
                  </div>
                </div>
              );
            })}
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:60,color:"rgba(255,255,255,0.15)"}}>
            <V2Icon name="users" size={40} />
            <div style={{fontFamily:"var(--v2-font-display)",fontWeight:700,fontSize:15,color:"rgba(255,255,255,0.3)"}}>Seleziona un profilo</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   PRATICHE — Tracker
   ══════════════════════════════════════════════════════════ */
function V2PraticheSection({ onOpen }) {
  const stats = [
    {label:"Da valutare",count:V2_PRATICHE.filter(p=>p.stato==="da-valutare").length,color:"rgba(255,255,255,0.5)",icon:"eye"},
    {label:"In corso",count:V2_PRATICHE.filter(p=>p.stato==="in-corso").length,color:"#818cf8",icon:"edit"},
    {label:"Presentate",count:V2_PRATICHE.filter(p=>p.stato==="presentata").length,color:"#fbbf24",icon:"arrowUpRight"},
    {label:"Ammesse",count:V2_PRATICHE.filter(p=>p.stato==="ammessa").length,color:"#34d399",icon:"check"},
    {label:"Erogate",count:V2_PRATICHE.filter(p=>p.stato==="erogata").length,color:"#6ee7b7",icon:"euro"},
    {label:"Rigettate",count:V2_PRATICHE.filter(p=>p.stato==="rigettata").length,color:"#f87171",icon:"x"},
  ];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10}}>
        {stats.map(({label,count,color,icon})=>(
          <div key={label} style={{padding:"18px 16px",borderRadius:14,background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.05)",textAlign:"center"}}>
            <div style={{width:32,height:32,borderRadius:8,background:`${color}15`,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:10}}>
              <V2Icon name={icon} size={14} color={color} />
            </div>
            <div style={{fontFamily:"var(--v2-font-num)",fontWeight:800,fontSize:28,color,letterSpacing:"-0.03em"}}>{count}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontWeight:500,marginTop:4}}>{label}</div>
          </div>
        ))}
      </div>

      {/* Table */}
      <div style={{borderRadius:16,overflow:"hidden",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)"}}>
        <div style={{display:"grid",gridTemplateColumns:"1.2fr 1.5fr 0.8fr 0.7fr 0.7fr 1.5fr",padding:"11px 20px",borderBottom:"1px solid rgba(255,255,255,0.05)",background:"rgba(255,255,255,0.02)"}}>
          {["Cliente","Bando","Stato","Importo","Data","Note"].map(h=>(
            <div key={h} style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",letterSpacing:"0.08em"}}>{h}</div>
          ))}
        </div>
        {V2_PRATICHE.map((p,i)=>{
          const sc = V2PraticaColors[p.stato] || V2PraticaColors["da-valutare"];
          return (
            <div key={i} className="v2-hover" style={{
              display:"grid",gridTemplateColumns:"1.2fr 1.5fr 0.8fr 0.7fr 0.7fr 1.5fr",
              padding:"13px 20px",borderBottom:"1px solid rgba(255,255,255,0.03)",
              cursor:"pointer",transition:"background .15s",alignItems:"center"
            }}>
              <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>{p.cliente}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingRight:8}}>{p.bando}</div>
              <div><span style={{display:"inline-flex",padding:"3px 10px",borderRadius:8,fontSize:11,fontWeight:600,background:sc.bg,color:sc.color,textTransform:"capitalize"}}>{p.stato.replace("-"," ")}</span></div>
              <div style={{fontFamily:"var(--v2-font-num)",fontSize:12,fontWeight:700,color:"#818cf8"}}>{v2FormatImporto(p.importo)}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.3)"}}>{p.data}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.25)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.note}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

Object.assign(window, { V2ScadenzeSection, V2ProfiliSection, V2PraticheSection });

</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const NAV_ITEMS = [
  { id:"bandi", label:"Bandi", icon:"radar" },
  { id:"scadenze", label:"Scadenze", icon:"calendar" },
  { id:"profili", label:"Aziende", icon:"users" },
  { id:"pratiche", label:"Pratiche", icon:"folder" },
];

/* ── SIDEBAR ──────────────────────────────────────────── */
function Sidebar({ active, setActive, isDark, setDark }) {
  const [settingsOpen, setSettingsOpen] = useState(false);
  const settingsRef = useRef(null);

  useEffect(() => {
    if (!settingsOpen) return;
    const handler = (e) => {
      if (settingsRef.current && !settingsRef.current.contains(e.target))
        setSettingsOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [settingsOpen]);

  return (
    <div style={{
      width:72,flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",
      padding:"16px 0",gap:4,borderRight:"1px solid var(--c-border-lo)",
      background:"var(--c-panel)"
    }}>
      {/* Logo */}
      <div style={{marginBottom:20,position:"relative"}}>
        <image-slot id="sidebar-logo" shape="rounded" radius="14" placeholder="Logo"
          style={{width:44,height:44}}></image-slot>
      </div>

      {/* Nav */}
      {NAV_ITEMS.map(({id,label,icon}) => (
        <button key={id} onClick={()=>setActive(id)} title={label} style={{
          width:48,height:48,borderRadius:12,border:"none",cursor:"pointer",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,
          background: active===id ? "rgba(99,102,241,0.15)" : "transparent",
          color: active===id ? "#a5b4fc" : "var(--c-fg-lo)",
          transition:"all .15s",position:"relative"
        }}>
          {active===id && <div style={{position:"absolute",left:-1,top:10,bottom:10,width:3,borderRadius:"0 3px 3px 0",background:"#818cf8"}}></div>}
          <V2Icon name={icon} size={18} />
          <span style={{fontSize:9,fontWeight:600,letterSpacing:"0.02em"}}>{label}</span>
        </button>
      ))}

      {/* Bottom — Settings */}
      <div style={{flex:1}}></div>
      <div ref={settingsRef} style={{position:"relative"}}>
        <button onClick={()=>setSettingsOpen(o=>!o)} title="Impostazioni" style={{
          width:48,height:48,borderRadius:12,border:"none",cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",
          background: settingsOpen ? "var(--c-surface-hi)" : "transparent",
          color: settingsOpen ? "var(--fg)" : "var(--c-fg-faint)",
          transition:"all .15s"
        }}>
          <V2Icon name="settings" size={18} />
        </button>
        {settingsOpen && (
          <div style={{
            position:"absolute",bottom:"calc(100% + 8px)",left:8,
            width:200,borderRadius:14,
            background:"var(--c-popup)",border:"1px solid var(--c-popup-border)",
            boxShadow:"0 16px 48px rgba(0,0,0,0.35)",zIndex:9000,
            padding:"6px",animation:"v2FadeIn .15s ease-out"
          }}>
            <div style={{padding:"8px 12px 6px",fontSize:10,fontWeight:700,color:"var(--c-fg-mid)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Aspetto</div>
            {[
              {label:"Tema Scuro",  value:true,  icon:"🌙"},
              {label:"Tema Chiaro", value:false, icon:"☀️"},
            ].map(({label,value,icon})=>(
              <button key={label} onClick={()=>{setDark(value);setSettingsOpen(false);}} style={{
                width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 12px",
                borderRadius:10,border:"none",textAlign:"left",
                background: isDark===value ? "rgba(99,102,241,0.15)" : "transparent",
                color: isDark===value ? "#a5b4fc" : "var(--fg)",
                fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"var(--v2-font-body)"
              }}>
                <span style={{fontSize:15}}>{icon}</span>
                {label}
                {isDark===value && <span style={{marginLeft:"auto",width:6,height:6,borderRadius:"50%",background:"#818cf8"}}></span>}
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── TOP BAR ──────────────────────────────────────────── */
function TopBar({ title, subtitle, user, setUser }) {
  const [userMenuOpen, setUserMenuOpen] = useState(false);
  const userMenuRef = useRef(null);

  useEffect(() => {
    if (!userMenuOpen) return;
    const handler = (e) => {
      if (userMenuRef.current && !userMenuRef.current.contains(e.target))
        setUserMenuOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [userMenuOpen]);

  return (
    <div style={{
      height:64,display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"0 28px",borderBottom:"1px solid var(--c-border-lo)",flexShrink:0
    }}>
      <div>
        <h1 style={{fontFamily:"var(--v2-font-display)",fontWeight:700,fontSize:18,color:"var(--fg-hi)",letterSpacing:"-0.025em",margin:0}}>{title}</h1>
        {subtitle && <p style={{fontSize:11,color:"var(--c-fg-lo)",marginTop:1}}>{subtitle}</p>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {/* Freshness */}
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:10,background:"var(--c-input)",border:"1px solid var(--c-border-hi)",fontSize:11,color:"var(--c-fg-mid)"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"#34d399"}}></span>
          Aggiornato 2h fa
        </div>
        {/* Lock */}
        <button style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:10,border:"1px solid var(--c-border-hi)",background:"var(--c-input)",fontSize:11,fontWeight:600,color:"var(--c-fg-lo)",cursor:"pointer"}}>
          <V2Icon name="lock" size={12} /> Riservato
        </button>
        {/* Bell */}
        <button style={{width:36,height:36,borderRadius:10,border:"1px solid var(--c-border-hi)",background:"var(--c-input)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--c-fg-faint)",position:"relative"}}>
          <V2Icon name="bell" size={15} />
          <span style={{position:"absolute",top:6,right:6,width:6,height:6,borderRadius:"50%",background:"#f87171",border:"2px solid var(--bg)"}}></span>
        </button>
        {/* User avatar + dropdown */}
        <div ref={userMenuRef} style={{position:"relative"}}>
          <button onClick={()=>setUserMenuOpen(o=>!o)} style={{
            width:34,height:34,borderRadius:10,border:"none",cursor:"pointer",
            background:"linear-gradient(135deg,#6366f1,#818cf8)",
            display:"flex",alignItems:"center",justifyContent:"center",
            color:"white",fontFamily:"var(--v2-font-display)",fontWeight:700,fontSize:13
          }}>
            {user ? user.charAt(0).toUpperCase() : "?"}
          </button>
          {userMenuOpen && (
            <div style={{
              position:"absolute",top:"calc(100% + 8px)",right:0,
              width:210,borderRadius:14,
              background:"var(--c-popup)",border:"1px solid var(--c-popup-border)",
              boxShadow:"0 16px 48px rgba(0,0,0,0.3)",zIndex:9000,
              padding:"6px",animation:"v2FadeIn .15s ease-out"
            }}>
              {user ? (
                <>
                  <div style={{padding:"10px 14px 8px",borderBottom:"1px solid var(--c-border)",marginBottom:4}}>
                    <div style={{fontSize:13,fontWeight:700,color:"var(--fg)"}}>{user}</div>
                    <div style={{fontSize:11,color:"var(--c-fg-mid)",marginTop:1}}>Account attivo</div>
                  </div>
                  <button onClick={()=>{setUser(null);setUserMenuOpen(false);}} style={{
                    width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 12px",
                    borderRadius:10,border:"none",background:"transparent",textAlign:"left",
                    color:"#f87171",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"var(--v2-font-body)"
                  }}>
                    <V2Icon name="lock" size={14} color="#f87171" /> Esci
                  </button>
                </>
              ) : (
                <>
                  <div style={{padding:"10px 14px 8px",borderBottom:"1px solid var(--c-border)",marginBottom:4}}>
                    <div style={{fontSize:13,fontWeight:700,color:"var(--fg)"}}>Ospite</div>
                    <div style={{fontSize:11,color:"var(--c-fg-mid)",marginTop:1}}>Non autenticato</div>
                  </div>
                  <button onClick={()=>{setUser("Utente");setUserMenuOpen(false);}} style={{
                    width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 12px",
                    borderRadius:10,border:"none",background:"transparent",textAlign:"left",
                    color:"var(--fg)",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"var(--v2-font-body)"
                  }}>
                    <V2Icon name="arrowRight" size={14} /> Accedi
                  </button>
                </>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── STATS STRIP ──────────────────────────────────────── */
function StatsStrip() {
  const aperti = V2_BANDI.filter(b => b.stato === "Aperto").length;
  const scad30 = V2_BANDI.filter(b => { const d = v2DaysUntil(b.scadenza); return d >= 0 && d <= 30; }).length;
  const dot = V2_BANDI.reduce((s,b) => s + (b.dotazione || 0), 0);
  const nuovi = V2_BANDI.filter(b => v2DaysUntil(b.dataIns) >= -30).length;

  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:4}}>
      {[
        {label:"Bandi aperti",value:aperti,icon:"target",color:"#34d399"},
        {label:"In scadenza 30gg",value:scad30,icon:"clock",color:"#fbbf24"},
        {label:"Dotazione totale",value:v2FormatImporto(dot),icon:"signal",color:"#818cf8"},
        {label:"Nuovi ultimi 30gg",value:nuovi,icon:"trendingUp",color:"#a78bfa"},
      ].map(({label,value,icon,color})=>(
        <div key={label} style={{
          padding:"18px 20px",borderRadius:16,position:"relative",overflow:"hidden",
          background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)"
        }}>
          {/* Glow */}
          <div style={{position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:color,opacity:0.04,filter:"blur(24px)"}}></div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,position:"relative"}}>
            <div style={{width:34,height:34,borderRadius:10,background:`${color}15`,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <V2Icon name={icon} size={16} color={color} />
            </div>
          </div>
          <div style={{fontFamily:"var(--v2-font-num)",fontWeight:700,fontSize:28,color:"#f1f5f9",letterSpacing:"-0.04em",lineHeight:1,position:"relative"}}>{value}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",fontWeight:500,marginTop:6,position:"relative"}}>{label}</div>
        </div>
      ))}
    </div>
  );
}

/* ── SECTION TITLES ───────────────────────────────────── */
const TITLES = {
  bandi: { title:"Esplora Bandi", sub:"Monitoraggio bandi · Emilia-Romagna, Italia, Europa" },
  scadenze: { title:"Scadenze", sub:"Timeline cronologica dei bandi aperti" },
  profili: { title:"Profili Aziende", sub:"Raccomandazioni personalizzate per ogni cliente" },
  pratiche: { title:"Le mie pratiche", sub:"Tracker domande e stato candidature" },
};

/* ── APP ──────────────────────────────────────────────── */
const V2_DEFAULTS = {
  accentHue: "239"
};

function App() {
  const [tweaks, setTweak] = useTweaks(V2_DEFAULTS);
  const [active, setActive] = useState("bandi");
  const [modal, setModal] = useState(null);
  const [isDark, setIsDark] = useState(true);
  const [user, setUser] = useState(null);
  const info = TITLES[active];

  useEffect(() => {
    const h = tweaks.accentHue;
    document.documentElement.style.setProperty("--v2-accent-hue", h);
  }, [tweaks]);

  useEffect(() => {
    document.body.setAttribute("data-theme", isDark ? "dark" : "light");
  }, [isDark]);

  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      <Sidebar active={active} setActive={setActive} isDark={isDark} setDark={setIsDark} />

      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <TopBar title={info.title} subtitle={info.sub} user={user} setUser={setUser} />

        <main style={{flex:1,overflow:"auto",padding:"24px 28px"}}>
          {active === "bandi" && (
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <StatsStrip />
              <V2BandiSection onOpen={setModal} />
            </div>
          )}
          {active === "scadenze" && <V2ScadenzeSection onOpen={setModal} />}
          {active === "profili" && <V2ProfiliSection onOpen={setModal} />}
          {active === "pratiche" && <V2PraticheSection onOpen={setModal} />}
        </main>

        {/* Footer */}
        <div style={{
          padding:"10px 28px",borderTop:"1px solid var(--c-border-lo)",
          display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--c-fg-faint)",flexShrink:0
        }}>
          <span style={{fontFamily:"var(--v2-font-display)",fontWeight:600}}>BandiRadar</span>
          <span>⚠️ Dati indicativi · verificare fonti ufficiali</span>
        </div>
      </div>

      {modal && <V2Modal bando={modal} onClose={()=>setModal(null)} />}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Tema" />
        <TweakSlider label="Accent hue" min={0} max={360} step={5}
          value={tweaks.accentHue} onChange={v=>setTweak("accentHue",v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
